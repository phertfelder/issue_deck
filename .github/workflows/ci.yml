name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    env:
      # PyQt6 must run headless in CI.
      QT_QPA_PLATFORM: offscreen

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install headless Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Install package + dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,keyring]"

      - name: Ruff (lint)
        run: ruff check .

      - name: Pytest
        run: pytest

      # mypy is advisory (PyQt6 ships no type stubs). It must not block CI.
      - name: Mypy (advisory, non-blocking)
        continue-on-error: true
        run: mypy issue_deck
